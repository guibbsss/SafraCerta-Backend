server:
  port: 8080
  servlet:
    context-path: /api

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/safracerta?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Sao_Paulo}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:sipavwebbitbyte}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
  show-actuator: false

jwt:
  secret: ${JWT_SECRET:SafraCertaJwtSecretChangeMe_Min32Chars_DevOnly_UseEnvInProd}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

app:
  registro:
    perfil-id: ${REGISTRO_PERFIL_ID:2}

logging:
  level:
    org.hibernate: WARN
    com.safracerta.config.security: DEBUG
    org.springframework.security: INFO
